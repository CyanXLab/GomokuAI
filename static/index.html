<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GomokuPrime</title>
    <link rel="stylesheet" href="https://cdn.staticfile.net/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=v5.1">
</head>
<body>
    <div id="app">
        <header class="titlebar">
            <div class="titlebar-left">
                <div class="brand-logo">
                    <span class="stone-mini black"></span>
                    <span class="stone-mini white"></span>
                </div>
                <div class="brand-meta">
                    <div class="brand-title">GomokuPrime</div>
                    <div class="brand-ver">v5.1</div>
                </div>
            </div>
            <div class="titlebar-right">
                <span class="status-tag" id="statusTag">自由 · 黑棋 · 0/0 · 人机</span>
                <div class="pill"><span class="pill-dot"></span><span id="engineStatus">就绪</span></div>
                <button class="icon-button" id="btnSettings" title="引擎参数"><i class="bi bi-gear"></i></button>
            </div>
        </header>

        <main class="content">
            <section class="board-section">
                <div class="board-card">
                    <canvas id="board" width="640" height="640"></canvas>
                </div>
                <div class="board-controls">
                    <button id="btnBack" class="ctrl-btn" title="后退"><i class="bi bi-arrow-left"></i></button>
                    <button id="btnForward" class="ctrl-btn" title="前进"><i class="bi bi-arrow-right"></i></button>
                    <button id="btnAiMove" class="ctrl-btn accent" title="AI下这一步"><i class="bi bi-cpu"></i><span>AI下子</span></button>
                </div>
                <div class="hint-bar" id="hintBar"><i class="bi bi-info-circle"></i><span id="hintText">点击棋盘交叉点，再次点击确认</span></div>
            </section>

            <aside class="sidebar">
                <div class="sidebar-body">
                    <div class="card">
                        <div class="card-header"><i class="bi bi-plus-circle"></i><h3>新对局</h3></div>
                        <div class="card-body">
                            <div class="field">
                                <label class="field-label">游戏模式</label>
                                <div class="segmented" id="modeControl">
                                    <button data-mode="pve" class="active"><i class="bi bi-robot"></i>人机</button>
                                    <button data-mode="pvp"><i class="bi bi-people"></i>双人</button>
                                </div>
                            </div>
                            <div class="field">
                                <label class="field-label">规则</label>
                                <div class="segmented" id="ruleControl">
                                    <button data-rule="0" class="active">自由</button>
                                    <button data-rule="1">标准</button>
                                    <button data-rule="2">连珠</button>
                                </div>
                                <div class="field-hint" id="ruleHint">无禁手，五连或长连均胜</div>
                            </div>
                            <div class="field" id="colorField">
                                <label class="field-label">玩家执子</label>
                                <div class="segmented" id="colorControl">
                                    <button data-color="1" class="active"><span class="stone-mini black"></span>执黑</button>
                                    <button data-color="2"><span class="stone-mini white"></span>执白</button>
                                </div>
                            </div>
                            <div class="field">
                                <label class="field-label">棋盘大小</label>
                                <div class="segmented" id="sizeControl">
                                    <button data-size="13">13</button>
                                    <button data-size="15" class="active">15</button>
                                    <button data-size="19">19</button>
                                </div>
                            </div>
                            <button id="btnNewGame" class="primary-button"><i class="bi bi-play-fill"></i><span>开始新对局</span></button>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <i class="bi bi-graph-up"></i><h3>评估曲线</h3>
                            <label class="switch"><input type="checkbox" id="evalToggle" checked><span class="slider"></span></label>
                        </div>
                        <div class="card-body" id="evalBody">
                            <canvas id="evalChart" width="300" height="120"></canvas>
                            <div class="eval-legend">
                                <span class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>黑棋</span>
                                <span class="legend-item"><span class="legend-dot" style="background:#4ade80"></span>白棋</span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i class="bi bi-list-ol"></i><h3>走子历史</h3></div>
                        <div class="card-body no-pad">
                            <div id="moveList" class="move-list"><div class="empty-hint">尚未开始对局</div></div>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <div id="settingsModal" class="modal-backdrop hidden">
            <div class="modal">
                <div class="modal-header"><h2>引擎参数</h2><button id="closeSettings" class="icon-button"><i class="bi bi-x-lg"></i></button></div>
                <div class="modal-body">
                    <div class="field">
                        <label class="field-label">单步思考时间 (毫秒)</label>
                        <input type="number" id="cfgTimeout" value="8000" min="100" max="60000" step="100" class="input">
                        <div class="field-hint">越大棋力越强（建议 5000-15000）</div>
                    </div>
                    <div class="field">
                        <label class="field-label">线程数 (0=自动使用所有核心)</label>
                        <input type="number" id="cfgThreads" value="0" min="0" max="64" class="input">
                    </div>
                    <div class="field">
                        <label class="field-label">最大内存 (MB)</label>
                        <input type="number" id="cfgMemory" value="512" min="32" max="4096" step="32" class="input">
                        <div class="field-hint">置换表大小，越大命中率越高</div>
                    </div>
                    <div class="field">
                        <label class="field-label">引擎架构</label>
                        <select id="cfgArch" class="input">
                            <option value="auto">自动选择</option>
                        </select>
                    </div>
                    <div class="field">
                        <label class="field-label">引擎信息</label>
                        <div id="cfgEngineInfo" class="engine-info"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="cancelSettings" class="ghost-button">取消</button>
                    <button id="saveSettings" class="primary-button"><i class="bi bi-check2"></i><span>保存</span></button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast hidden"></div>
    </div>
    <script src="/static/js/main.js?v=v5.1"></script>
</body>
</html>
